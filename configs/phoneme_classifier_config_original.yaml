
phoneme_classifier:
  _name_: phoneme_classifier
  in_channels: 80
  out_channels: 72 #the number of dictionay size
  diffusion_step_embed_dim_in: 128
  diffusion_step_embed_dim_mid: 512
  diffusion_step_embed_dim_out: 512
  res_channels: 256 # 128 for wavlm, 512 without wavlm
  skip_channels: 256
  num_res_layers: 6
  dilation_cycle: 2
  mel_upsample: [2, 2]
  cond_feat_size: 80
  unconditional: True
  wavlm:
    use_wavlm_rep: False
    use_weighted_sum_wavlm: True # if False use the last hidden states
    use_all_hidden_states: True
    specific_indices:
      use_indices_hidden_states: False
      indices_hidden_states: #this indicate for each block which layers to take to the weighted sum
          {0: [0, 1, 2],
          1: [0, 1, 2],
          2: [0, 1, 2],
          3: [0, 1, 2],
          4: [0, 1, 2],
          5: [0, 1, 2],
          6: [0, 1, 2],
          7: [0, 1, 2],
          8: [0, 1, 2],
          9: [0, 1, 2],
          10: [0, 1, 2],
          11: [0, 1, 2]} #the number of keys is the the same as num_res_layers
    concat_mel_with_wavlm: False # fuse  and then process
    version_model: 'microsoft/wavlm-base-plus' # microsoft/wavlm-large, microsoft/wavlm-base-plus
    reduce_channels: False
    two_branch: False # process each branch separately and then fuse them




diffusion:
  T: 400
  beta_0: 0.0001
  beta_T: 0.02
  beta: null

dataset:
  dataset_type: 'speech_inpainting_phoneme_classifier' # explosion_speech_inpainting_phoneme_classifier, speech_inpainting_phoneme_classifier
  speech_inpainting_phoneme_classifier:
    base_data_dir: /dsi/gannot-lab1/datasets/Librispeech_mfa
    csv_loc: /dsi/gannot-lab1/datasets/Librispeech_mfa/ # /dsi/gannot-lab1/datasets/Librispeech_mfa/Test.csv, /dsi/gannot-lab1/datasets/Librispeech_mfa/Train.csv
    sampling_rate: ${audio.sampling_rate}
    # for train - relatively large masking
    min_block_size: 30 # 35, 10 
    max_block_size: 65 # 65 , 15
    min_spacing:  30 # 30, 70
    # relatively middle masking
    # min_block_size: 25 # 35, 10 
    # max_block_size: 40 # 65 , 15
    # min_spacing:  70 # 30, 70
    # relatively small masking
    # min_block_size: 10 # 35, 10 
    # max_block_size: 15 # 65 , 15
    # min_spacing:  70 # 30, 70
    rand_num_blocks: True
    num_blocks: 2 #used when rand_num_blocks=False
    # return_mask_properties: False #for train set this to False, for inference set to True
    audio_stft_hop: ${audio.hop_length}
    num4empty_str: randn #or -12, 0, min, randn
  explosion_speech_inpainting_phoneme_classifier:
    base_data_dir: /dsi/gannot-lab1/datasets/speech_with_explosions
    sampling_rate: ${audio.sampling_rate}
    audio_stft_hop: ${audio.hop_length}


audio:
  sampling_rate: 16000
  filter_length: 640
  hop_length: 160
  win_length: 640
  mel_fmin: 20.0
  mel_fmax: 8000.0

train: # Not used in generate.py
  name:  LibSp_masked_pix=${train.w_masked_pix}_learning_rate=${train.learning_rate}_on_masked_melspec=${train.on_masked_melspec}_unconditional_like-original-network #LibSp_wavlm-base-plus-rep_w_masked_pix=${train.w_masked_pix}_two_branch=${phoneme_classifier.wavlm.two_branch}   # LibSp_only-wavlm-base-plus-rep_w_masked_pix=${train.w_masked_pix}     # Name of experiment (prefix of experiment name)
  save_dir: /dsi/gannot-lab1/users/mordehay/phoneme_classifier    # where checkpoints will be saved 
  ckpt_iter: max    # continue training from a specific iteration

  # for testing the training phase
  # iters_per_ckpt: 20 #20 #10000
  # iters_per_logging: 1 #1 #100
  # n_iters: 200 #200 #1000001
  #for complete training
  iters_per_ckpt: 500 #20 #10000 please change this number with dependence on batch size and number of gpu
  iters_per_logging: 50 #1 #100
  n_iters: 20000001 #200 #1000001

  learning_rate: 1e-03 #2e-4
  batch_size_per_gpu: 128 #64 #30 # 240
  w_masked_pix: 0.5
  on_masked_melspec: True

inference:
  name: LibSp_wavlm-base-plus-rep_w_masked_pix=0.8_two_branch=True_all_hidden_states_randn-filled_multi-gpu
  ckpt_path: /dsi/gannot-lab1/users/mordehay/phoneme_classifier/exp/LibSp_wavlm-base-plus-rep_w_masked_pix=0.99_two_branch=True_all_hidden_states_randn-filled/wnet_h512_d12_T400_betaT0.02/checkpoint/6500.pkl
  n_samples: 2        # Number of utterances from test dataset to be generated, used in train every iters_per_ckpt iters
  # n_samples_test: 10 # used in full inference mel only
  # video_path: null      # generate audio for a given silent video file
  # w_mel_cond: 2            # w1 in the paper
  # w_asr: 1.5 #1.5            # w2 in the paper
  # asr_start: 270 #270        # t_asr
  save_dir: /dsi/gannot-lab1/users/mordehay/phoneme_classifier/exp/LibSp_wavlm-base-plus-rep_w_masked_pix=0.99_two_branch=True_all_hidden_states_randn-filled/wnet_h512_d12_T400_betaT0.02 # where to save the generated audio
  inference_phoneme_only_name_dir: as-train-gap_6500cp_filled-with-randn #middle_gap_mask_2cp # generated_mels, small_gap_mask, as-train-gap, mask is present in sampling process - x_t * mask + (1 - mask) * masked_x
  # without_condtion: False
  # config_filename_asr_cond: /home/dsi/moradim/SpeechRepainting/mouthroi_processing/configs/LRS3_A_WER1.0.ini
  # apply_asr_guidance: True
  # lipread_text_dir: null # directory with predicted text for generating test samples of benchmark dataset 
  on_masked_melspec: True

distributed:
  dist_backend: nccl
  dist_url: tcp://localhost:54321 #54321
