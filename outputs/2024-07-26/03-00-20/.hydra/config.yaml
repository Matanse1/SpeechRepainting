melgen:
  _name_: melgen
  in_channels: 80
  out_channels: 80
  diffusion_step_embed_dim_in: 128
  diffusion_step_embed_dim_mid: 512
  diffusion_step_embed_dim_out: 512
  res_channels: 512
  skip_channels: 512
  num_res_layers: 12
  dilation_cycle: 1
  mel_upsample:
  - 2
  - 2
  cond_feat_size: 80
diffusion:
  T: 400
  beta_0: 0.0001
  beta_T: 0.02
  beta: null
dataset:
  audio_dir: /dsi/gannot-lab1/datasets/reverb_data/audio
  mel_dir: /dsi/gannot-lab1/datasets/reverb_data/mel
  mel_image_dir: /dsi/gannot-lab1/datasets/reverb_data/mel_image
  sampling_rate: ${audio.sampling_rate}
  min_block_size: 35
  max_block_size: 65
  min_spacing: 30
  audio_stft_hop: ${audio.hop_length}
audio:
  sampling_rate: 16000
  filter_length: 640
  hop_length: 160
  win_length: 640
  mel_fmin: 20.0
  mel_fmax: 8000.0
train:
  name: LibSp
  save_dir: /dsi/gannot-lab1/users/mordehay/speech_repainting
  ckpt_iter: max
  iters_per_ckpt: 20
  iters_per_logging: 1
  n_iters: 1000001
  learning_rate: 0.0002
  batch_size_per_gpu: 8
generate:
  name: LRS3
  ckpt_path: exp/LRS3/wnet_h512_d12_T400_betaT0.02/checkpoint/1000000.pkl
  n_samples: 3
  video_path: null
  w_video: 2
  w_asr: 1.5
  asr_start: 270
  save_dir: null
  lipread_text_dir: null
distributed:
  dist_backend: nccl
  dist_url: tcp://localhost:54321
